<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 600" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Apple Color Emoji', Helvetica, Arial, sans-serif">
  <defs>
    <filter id="s" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#1a1d24" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#c2c7d0"/>
    </marker>
  </defs>
  <rect id="bg-card" x="0" y="0" width="720" height="600" fill="#fbfbfd"/>

  <g stroke="#c2c7d0" stroke-width="3" marker-end="url(#arrow)">
    <line x1="360" y1="96" x2="360" y2="128"/>
    <line x1="360" y1="402" x2="360" y2="434"/>
    <line x1="360" y1="500" x2="360" y2="532"/>
  </g>

  <!-- A: you -->
  <g filter="url(#s)"><rect x="160" y="40" width="400" height="56" rx="28" fill="#ffd400"/></g>
  <text x="360" y="76" text-anchor="middle" font-size="19" fill="#1a1d24">🎬  “package &amp; upload this cut”</text>

  <!-- B: the agent -->
  <g filter="url(#s)"><rect x="100" y="128" width="520" height="274" rx="20" fill="#1f2430"/></g>
  <text x="132" y="168" font-size="19" font-weight="800" fill="#e8eaed">🤖  the agent</text>
  <text x="300" y="168" font-size="13" fill="#8a909c">- one conversation</text>
  <line x1="132" y1="184" x2="588" y2="184" stroke="#333a47" stroke-width="1"/>

  <g font-size="18" fill="#e8eaed">
    <text x="140" y="224">👁️🎧   <tspan fill="#e8eaed">watches + listens</tspan> <tspan fill="#6ea8fe">→ knows the video</tspan></text>
    <text x="140" y="266">🖼️   designs + picks the poster cover</text>
    <text x="140" y="308">✍️   writes the title + description</text>
    <text x="140" y="350">💬   adds chapters + captions</text>
  </g>
  <rect x="120" y="366" width="480" height="22" rx="11" fill="none"/>
  <text x="140" y="388" font-size="14" fill="#ffd479">🕵️  sub-agents double-check the cover &amp; the SEO</text>

  <!-- C: you just glance -->
  <g filter="url(#s)"><rect x="160" y="434" width="400" height="66" rx="20" fill="#ffd400"/></g>
  <text x="360" y="466" text-anchor="middle" font-size="19" fill="#1a1d24">👀  you glance + nod</text>
  <text x="360" y="488" text-anchor="middle" font-size="13" font-style="italic" fill="#7a6a00">the cover's already picked</text>

  <!-- D: ship -->
  <g filter="url(#s)"><rect x="160" y="532" width="400" height="56" rx="28" fill="#1f2430"/></g>
  <text x="360" y="568" text-anchor="middle" font-size="18" fill="#e8eaed">🚀  upload · schedule · publish</text>
</svg>
