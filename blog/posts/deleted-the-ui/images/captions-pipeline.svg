<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 400" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#c2c7d0"/></marker>
  </defs>
  <rect width="1000" height="400" fill="#fbfbfd"/>

  <!-- raw audio -->
  <rect x="28" y="150" width="150" height="84" rx="14" fill="#1f2430"/>
  <text x="103" y="188" text-anchor="middle" font-size="17" fill="#e8eaed">🎧 raw audio</text>
  <text x="103" y="212" text-anchor="middle" font-size="13" fill="#8a909c">(first pass: a mess)</text>

  <g stroke="#c2c7d0" stroke-width="3" marker-end="url(#ar)">
    <line x1="184" y1="192" x2="222" y2="192"/>
    <line x1="724" y1="192" x2="762" y2="192"/>
  </g>

  <!-- deterministic transcription box -->
  <rect x="228" y="60" width="490" height="264" rx="18" fill="#1f2430"/>
  <text x="252" y="100" font-size="18" font-weight="800" fill="#e8eaed">deterministic transcription</text>
  <text x="252" y="124" font-size="13" fill="#ffd479">stronger speech model + three fixed levers</text>
  <line x1="252" y1="138" x2="694" y2="138" stroke="#333a47" stroke-width="1"/>
  <g font-size="17" fill="#e8eaed">
    <text x="252" y="174">📖  glossary of this video's proper nouns</text>
    <text x="252" y="212">🔇  voice-activity detection (no hallucinated loops)</text>
    <text x="252" y="250">🔒  pinned decoding - same run, same result</text>
  </g>
  <text x="252" y="296" font-size="14" fill="#8a909c">🧹  then a grounded cleanup pass - checked vs the glossary + frames</text>

  <!-- accurate captions -->
  <rect x="766" y="150" width="206" height="84" rx="14" fill="#ffd400"/>
  <text x="869" y="188" text-anchor="middle" font-size="17" fill="#1a1d24">📝 accurate captions</text>
  <text x="869" y="212" text-anchor="middle" font-size="13" fill="#7a6a00">spelled right, in sync</text>

  <text x="500" y="372" text-anchor="middle" font-size="15" font-style="italic" fill="#566077">deterministic: same audio in  →  same transcript out</text>
</svg>
