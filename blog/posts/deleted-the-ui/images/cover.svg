<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#171a2e"/>
      <stop offset="0.55" stop-color="#1e2138"/>
      <stop offset="1" stop-color="#2a1c40"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.55">
      <stop offset="0" stop-color="#ffd400" stop-opacity="0.13"/>
      <stop offset="1" stop-color="#ffd400" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- kicker -->
  <text x="600" y="158" text-anchor="middle" font-size="22" font-weight="700" letter-spacing="6" fill="#ffd400">AGENTS · CLAUDE CODE</text>

  <!-- title (centered, inside the safe crop zone) -->
  <g text-anchor="middle" fill="#f3f5f9" font-weight="800" letter-spacing="-1">
    <text x="600" y="295" font-size="88">I Deleted the UI</text>
    <text x="600" y="392" font-size="88">&amp; Talked to the <tspan fill="#ffd400">Agent</tspan>.</text>
  </g>

  <!-- subtitle -->
  <text x="600" y="452" text-anchor="middle" font-size="27" fill="#aab2c5">From a web app into a conversation.</text>

  <!-- UI -> terminal motif, centered -->
  <g transform="translate(420,498)">
    <rect x="0" y="0" width="84" height="40" rx="8" fill="none" stroke="#566077" stroke-width="2.5"/>
    <line x1="10" y1="14" x2="74" y2="14" stroke="#566077" stroke-width="2"/>
    <text x="42" y="31" text-anchor="middle" font-size="15" fill="#8a90a3" >UI</text>
    <line x1="4" y1="4" x2="80" y2="36" stroke="#ff6b6b" stroke-width="3"/>
    <text x="118" y="28" font-size="26" fill="#566077">→</text>
    <text x="160" y="29" font-size="24" font-family="ui-monospace, Menlo, monospace" fill="#ffd400">›_ just talk to it</text>
  </g>
</svg>
